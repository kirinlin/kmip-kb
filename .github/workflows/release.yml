name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp_go/go.mod
          cache-dependency-path: mcp_go/go.sum

      - name: Generate embedded DB
        working-directory: mcp_go
        run: go run ./cmd/gen-db -kb ${{ github.workspace }}/kb -out internal/kb/data/kb.db

      - name: Build
        working-directory: mcp_go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          go build -tags embed
          -o bin/kmip-kb-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          ./cmd/kmip-kb

      - uses: actions/upload-artifact@v4
        with:
          name: kmip-kb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mcp_go/bin/kmip-kb-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
